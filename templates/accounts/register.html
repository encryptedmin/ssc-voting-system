{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card auth-card">

            <h2 class="mb-4 text-center">
                Voter Registration
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success w-100">

                    Register

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
