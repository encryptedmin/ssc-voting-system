{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card auth-card">

            <div class="text-center mb-4">

                <h2>SSC E-Voting Login</h2>

                <p class="text-muted">
                    Colegio de Kidapawan
                </p>

            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">Username</label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Password</label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-primary w-100">

                    Login

                </button>

            </form>

            <hr>

            <div class="text-center">

                <a href="{% url 'register' %}">
                    Register as Voter
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
